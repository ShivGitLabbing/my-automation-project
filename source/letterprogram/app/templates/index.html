<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toddler Alphabet Adventure</title>
    <style>
        :root {
            --bg-color: #fffdf0;
            --card-shadow: rgba(0, 0, 0, 0.1);
        }

        body { 
            font-family: 'Comic Sans MS', 'Chalkboard SE', 'Arial Round', sans-serif; 
            background-color: var(--bg-color); 
            margin: 0;
            padding: 40px 20px;
            text-align: center; 
        }

        h1 { 
            color: #ff5722; 
            font-size: 3.5rem; 
            margin-bottom: 50px;
            letter-spacing: 2px;
            text-shadow: 3px 3px 0px #fff;
        }

        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); 
            gap: 40px; 
            max-width: 1200px; 
            margin: 0 auto; 
        }

        .card { 
            background: white; 
            border-radius: 50px; 
            padding: 30px; 
            box-shadow: 0 15px 35px var(--card-shadow); 
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 10px solid #eee;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* The Bouncy Tap Effect */
        .card:hover { 
            transform: scale(1.05) translateY(-10px); 
            box-shadow: 0 25px 50px rgba(0,0,0,0.2);
        }

        .card:active {
            transform: scale(0.9);
        }

        /* The Hero Letter */
        .letter-hero {
            font-size: 7rem;
            font-weight: 900;
            line-height: 1;
            margin-bottom: 10px;
        }

        .card img { 
            width: 180px; 
            height: 180px; 
            object-fit: contain; 
            border-radius: 30px;
            margin-bottom: 15px;
        }

        .animal-name { 
            font-size: 2rem; 
            color: #444;
            font-weight: bold;
            text-transform: capitalize;
            margin: 0;
        }

        /* Rainbow Border & Letter Colors */
        .card:nth-child(4n+1) { border-color: #FF6B6B; }
        .card:nth-child(4n+1) .letter-hero { color: #FF6B6B; }

        .card:nth-child(4n+2) { border-color: #4ECDC4; }
        .card:nth-child(4n+2) .letter-hero { color: #4ECDC4; }

        .card:nth-child(4n+3) { border-color: #FFD93D; }
        .card:nth-child(4n+3) .letter-hero { color: #FFD93D; }

        .card:nth-child(4n+4) { border-color: #6C5CE7; }
        .card:nth-child(4n+4) .letter-hero { color: #6C5CE7; }

        /* Hide images that fail to load to keep it clean */
        img[src=""], img:not([src]) { visibility: hidden; height: 0; }
    </style>
</head>
<body>

    <h1>🌈 Tap a Letter! 🌈</h1>

    <div class="grid">
        {% for animal in animals %}
        <div class="card" onclick="playAnimalSound('{{ animal }}')">
            
            <div class="letter-hero">{{ animal[0]|upper }}</div>
            
            <img src="/static/images/{{ animal }}.jpg" 
                 alt="{{ animal }}"
                 onerror="this.style.display='none'">
            
            <p class="animal-name">{{ animal }}</p>
            
            <audio id="audio-{{ animal }}">
                <source src="/static/audio/{{ animal }}.mp3" type="audio/mpeg">
            </audio>
        </div>
        {% endfor %}
    </div>

    <script>
        function playAnimalSound(id) {
            const audio = document.getElementById('audio-' + id);
            if (audio) {
                audio.currentTime = 0; // Rewind to start if they spam-click
                audio.play();
            }
        }
    </script>

</body>
</html>
